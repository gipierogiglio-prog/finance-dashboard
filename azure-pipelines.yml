# Deploy finance-dashboard
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: finance-dashboard
  - name: STACK
    value: 
  - name: DEPLOY_ENABLED
    value: "true"
  - name: TEST_ENABLED
    value: "false"
  - name: DOCS_ENABLED
    value: "false"

resources:
  repositories:
    - repository: templates
      type: github
      name: gipierogiglio-prog/devgiglio-pipelines
      ref: main
      endpoint: gipierogiglio-prog

pool: Default

stages:
  - template: stages/build/${stack}-build.yml@templates
    parameters:
      appName: $(APP_NAME)

  - ${{ if eq(variables.TEST_ENABLED, 'true') }}:
    - template: stages/test/${stack}-test.yml@templates
      parameters:
        appName: $(APP_NAME)

  - ${{ if eq(variables.DOCS_ENABLED, 'true') }}:
    - template: stages/docs/technical-doc.yml@templates
      parameters:
        appName: $(APP_NAME)

  - ${{ if eq(variables.DEPLOY_ENABLED, 'true') }}:
    - template: stages/deploy/deploy-vps.yml@templates
      parameters:
        appName: $(APP_NAME)
