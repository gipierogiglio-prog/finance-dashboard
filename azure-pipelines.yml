# Deploy finance-dashboard - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: finance-dashboard

pool: ubuntu-latest
steps:
  - bash: |
      echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
      docker build -t ghcr.io/gipierogiglio-prog/finance-dashboard:latest .
      docker push ghcr.io/gipierogiglio-prog/finance-dashboard:latest
    displayName: "Build, Login & Push"

  - task: SSH@0
    displayName: "Deploy via SSH"
    inputs:
      sshEndpoint: devgiglio-vps-ssh
      runOptions: commands
      commands: |
        cd /opt/devgiglio
        docker pull ghcr.io/gipierogiglio-prog/finance-dashboard:latest
        docker compose up -d --force-recreate finance-dashboard
