# Deploy finance-dashboard - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: finance-dashboard

pool: Default

stages:
  - stage: Build
    displayName: "🔨 Build & Validate"
    jobs:
      - job: BuildAndValidate
        displayName: "Build & Security"
        steps:
          - bash: |
              echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
              docker build -t ghcr.io/gipierogiglio-prog/finance-dashboard:build-$(Build.BuildId) .
            displayName: "Build Docker Image"
          - bash: |
              echo "✅ Build successful"
            displayName: "Build Validation"

  - stage: Test
    displayName: "🧪 Tests"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: RunTests
        displayName: "Run Tests"
        steps:
          - bash: |
              echo "No automated tests configured yet"
            displayName: "Test Suite (placeholder)"

  - stage: Deploy
    displayName: "🚀 Deploy"
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: PushAndDeploy
        displayName: "Push & Deploy"
        steps:
          - bash: |
              echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
              docker tag ghcr.io/gipierogiglio-prog/finance-dashboard:build-$(Build.BuildId) ghcr.io/gipierogiglio-prog/finance-dashboard:latest
              docker push ghcr.io/gipierogiglio-prog/finance-dashboard:latest
            displayName: "Push to GHCR"
          - bash: |
              cd /opt/devgiglio
              docker compose rm -fsv finance-dashboard 2>/dev/null || true
              docker pull ghcr.io/gipierogiglio-prog/finance-dashboard:latest
              docker compose up -d --force-recreate finance-dashboard
            displayName: "Deploy to VPS"
